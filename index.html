<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DREAM OF PARIS</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; }
  canvas { display:block; }
</style>

<body>
<canvas id="c"></canvas>
<script>
'use strict';
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H;
function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── MATH HELPERS ────────────────────────────────────────────────────────────
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const ease = t => t<0.5 ? 2*t*t : -1+(4-2*t)*t;
const easeIn = t => t*t*t;
const easeOut = t => 1 - Math.pow(1-t,3);
const smoothstep = (a,b,t) => { const x=clamp((t-a)/(b-a),0,1); return x*x*(3-2*x); };

// ─── CAMERA ──────────────────────────────────────────────────────────────────
// Camera state: position (cx,cy,cz), look target (tx,ty,tz), fov
const cam = { x:0, y:60, z:350, tx:0, ty:40, tz:0, fov:420,
              shake:0, rotZ:0 };

function project(wx, wy, wz) {
  // Translate relative to camera
  let dx = wx - cam.x, dy = wy - cam.y, dz = wz - cam.z;

  // Look direction vector
  const lvx = cam.tx - cam.x, lvy = cam.ty - cam.y, lvz = cam.tz - cam.z;
  const ld = Math.sqrt(lvx*lvx + lvy*lvy + lvz*lvz) || 1;
  const lx = lvx/ld, ly = lvy/ld, lz = lvz/ld;

  // Right vector (cross look × world-up)
  let rx = lz, ry = 0, rz = -lx;
  const rm = Math.sqrt(rx*rx+rz*rz) || 1; rx/=rm; rz/=rm;

  // Up vector
  const ux = ly*rz - lz*ry;
  const uy = lz*rx - lx*rz;
  const uz = lx*ry - ly*rx;

  // Project into camera space
  const cx2 = dx*rx + dy*ry + dz*rz;
  const cy2 = dx*ux + dy*uy + dz*uz;
  const cz2 = dx*lx + dy*ly + dz*lz;

  if (cz2 <= 2) return null;
  const scale = cam.fov / cz2;

  // Camera shake
  const shX = cam.shake * (Math.random()-0.5) * 4;
  const shY = cam.shake * (Math.random()-0.5) * 4;

  // Camera roll
  const cos = Math.cos(cam.rotZ), sin = Math.sin(cam.rotZ);
  const sx = cx2*cos - cy2*sin;
  const sy = cx2*sin + cy2*cos;

  return {
    x: W/2 + sx * scale + shX,
    y: H/2 - sy * scale + shY,
    z: cz2, scale
  };
}

function line3d(x1,y1,z1,x2,y2,z2) {
  const a = project(x1,y1,z1), b = project(x2,y2,z2);
  if (!a||!b) return;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
}

function dot3d(x,y,z,r) {
  const p = project(x,y,z);
  if(!p) return null;
  ctx.beginPath(); ctx.arc(p.x,p.y,r*p.scale*0.005+r*0.5,0,Math.PI*2); ctx.fill();
  return p;
}

// ─── STARS ───────────────────────────────────────────────────────────────────
const STARS = Array.from({length:400},()=>({
  x:(Math.random()-0.5)*3000, y:(Math.random()-0.5)*800-100,
  z:(Math.random()-0.5)*3000, twinkle:Math.random()*Math.PI*2,
  r:Math.random()*2+0.5, hue:Math.random()*60+200
}));

function drawStars(alpha, t) {
  STARS.forEach(s=>{
    const p = project(s.x,s.y,s.z); if(!p||p.z>1500) return;
    const tw = 0.6+0.4*Math.sin(s.twinkle+t*2.5);
    const bright = Math.floor(180*tw);
    ctx.fillStyle = `hsla(${s.hue},60%,${Math.floor(60+bright*0.3)}%,${alpha*tw})`;
    const r = s.r*(1-clamp(p.z/1500,0,1)*0.7);
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
  });
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
class ParticleSystem {
  constructor() { this.particles = []; }
  spawn(x,y,z,opts={}) {
    this.particles.push({
      x,y,z,
      vx:(Math.random()-0.5)*(opts.spread||10),
      vy:opts.vy!==undefined?opts.vy:Math.random()*5+2,
      vz:(Math.random()-0.5)*(opts.spread||10),
      life:1, decay:opts.decay||0.008+Math.random()*0.005,
      r:opts.r||2+Math.random()*3,
      hue:opts.hue||50, sat:opts.sat||100, lit:opts.lit||70,
      alpha:opts.alpha||1
    });
  }
  update() {
    this.particles = this.particles.filter(p=>{
      p.x+=p.vx*0.3; p.y+=p.vy*0.3; p.z+=p.vz*0.3;
      p.vy+=0.05; // gravity
      p.life-=p.decay; return p.life>0;
    });
  }
  draw(globalAlpha=1) {
    this.particles.forEach(p=>{
      const pt = project(p.x,p.y,p.z); if(!pt) return;
      const a = p.life*p.alpha*globalAlpha;
      ctx.shadowBlur = 8;
      ctx.shadowColor = `hsl(${p.hue},${p.sat}%,${p.lit}%)`;
      ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${a})`;
      const r = p.r*(1+pt.scale*0.002);
      ctx.beginPath(); ctx.arc(pt.x,pt.y,Math.max(0.5,r),0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur=0;
  }
}
const embers = new ParticleSystem();
const mist   = new ParticleSystem();
const sparks  = new ParticleSystem();

// ─── EIFFEL TOWER ────────────────────────────────────────────────────────────
function buildTower() {
  // Returns array of line segments [x1,y1,z1,x2,y2,z2]
  const segs = [];
  const add = (x1,y1,z1,x2,y2,z2) => segs.push([x1,y1,z1,x2,y2,z2]);

  // Ground level Y = -80 (tower base), top ~= +140
  // ── Legs: 4 curved pillars ──
  const legSteps = 10;
  const dirs = [{dx:1,dz:1},{dx:1,dz:-1},{dx:-1,dz:1},{dx:-1,dz:-1}];
  dirs.forEach(({dx,dz})=>{
    for(let i=0;i<legSteps;i++){
      const f1=i/legSteps, f2=(i+1)/legSteps;
      // Curved: wide at base, narrows with slight inward curve
      const curve1 = Math.pow(1-f1,1.5);
      const curve2 = Math.pow(1-f2,1.5);
      add(dx*58*curve1,-80+65*f1,dz*58*curve1, dx*58*curve2,-80+65*f2,dz*58*curve2);
    }
    // Cross-braces
    for(let i=0;i<5;i++){
      const f=i/5+0.1;
      const cc=Math.pow(1-f,1.5);
      add(dx*58*cc,-80+65*f,dz*58*cc, dx*58*cc*0.3,-80+65*f,dz*58*cc*0.3);
    }
  });

  // ── Base arches ──
  const archPts=16;
  [{ax:1,az:0},{ax:-1,az:0},{ax:0,az:1},{ax:0,az:-1}].forEach(({ax,az})=>{
    for(let i=0;i<archPts;i++){
      const a1=(i/archPts)*Math.PI, a2=((i+1)/archPts)*Math.PI;
      const r=58;
      add(ax*r*Math.cos(a1-Math.PI/2),-80,az*r*Math.cos(a1-Math.PI/2)+r*Math.sin(a1-Math.PI/2),
          ax*r*Math.cos(a2-Math.PI/2),-80,az*r*Math.cos(a2-Math.PI/2)+r*Math.sin(a2-Math.PI/2));
    }
  });

  // ── First platform ──
  const p1y=-15;
  const r1=22;
  const rsegs=18;
  for(let i=0;i<rsegs;i++){
    const a1=(i/rsegs)*Math.PI*2, a2=((i+1)/rsegs)*Math.PI*2;
    add(Math.cos(a1)*r1,p1y,Math.sin(a1)*r1, Math.cos(a2)*r1,p1y,Math.sin(a2)*r1);
    add(Math.cos(a1)*r1,p1y,Math.sin(a1)*r1, Math.cos(a1)*(r1-5),p1y+4,Math.sin(a1)*(r1-5));
  }

  // ── Mid section ──
  const msegs=8;
  for(let i=0;i<msegs;i++){
    const a=(i/msegs)*Math.PI*2;
    const r0=19,r1t=8;
    add(Math.cos(a)*r0,p1y,Math.sin(a)*r0, Math.cos(a)*r1t,p1y+65,Math.sin(a)*r1t);
    if(i%2===0){
      for(let j=0;j<5;j++){
        const f=j/5;
        const rb=lerp(r0,r1t,f);
        const rc=lerp(r0,r1t,(j+1)/5);
        add(Math.cos(a)*rb,p1y+65*f,Math.sin(a)*rb, Math.cos(a)*rc,p1y+65*(j+1)/5,Math.sin(a)*rc);
      }
    }
  }

  // Horizontal rings on mid section
  for(let j=0;j<6;j++){
    const f=(j+1)/7;
    const rr=lerp(19,8,f);
    const yy=p1y+65*f;
    for(let i=0;i<12;i++){
      const a1=(i/12)*Math.PI*2, a2=((i+1)/12)*Math.PI*2;
      add(Math.cos(a1)*rr,yy,Math.sin(a1)*rr, Math.cos(a2)*rr,yy,Math.sin(a2)*rr);
    }
  }

  // ── Second platform ──
  const p2y=p1y+65;
  const r2=9;
  for(let i=0;i<rsegs;i++){
    const a1=(i/rsegs)*Math.PI*2, a2=((i+1)/rsegs)*Math.PI*2;
    add(Math.cos(a1)*r2,p2y,Math.sin(a1)*r2, Math.cos(a2)*r2,p2y,Math.sin(a2)*r2);
  }

  // ── Spire ──
  const spireSegs=12;
  for(let i=0;i<spireSegs;i++){
    const a=(i/spireSegs)*Math.PI*2;
    add(Math.cos(a)*8,p2y,Math.sin(a)*8, 0,p2y+55,0);
    if(i%2===0){
      for(let j=0;j<4;j++){
        const f=j/4;
        const rr=8*(1-f);
        const rr2=8*(1-(j+1)/4);
        add(Math.cos(a)*rr,p2y+55*f,Math.sin(a)*rr, Math.cos(a)*rr2,p2y+55*(j+1)/4,Math.sin(a)*rr2);
      }
    }
  }

  // ── Antenna ──
  add(0,p2y+55,0, 0,p2y+72,0);
  return segs;
}
const TOWER_SEGS = buildTower();

function drawTower(hue, alpha, glow) {
  const gStr = `hsla(${hue},100%,70%,${alpha})`;
  ctx.strokeStyle = gStr;
  ctx.lineWidth = 1.2;
  if (glow > 0) {
    ctx.shadowColor = `hsl(${hue},100%,65%)`;
    ctx.shadowBlur = glow;
  }
  TOWER_SEGS.forEach(([x1,y1,z1,x2,y2,z2]) => line3d(x1,y1,z1,x2,y2,z2));
  ctx.shadowBlur = 0;
}

// ─── GROUND ───────────────────────────────────────────────────────────────────
function drawGround(hue, alpha, t) {
  // Perspective grid
  const Y = -80;
  for(let i=-16;i<=16;i++){
    ctx.strokeStyle=`hsla(${hue},80%,35%,${alpha*0.6})`;
    ctx.lineWidth=0.7;
    line3d(i*30,Y,-500, i*30,Y,500);
  }
  for(let j=-15;j<=15;j++){
    line3d(-500,Y,j*30, 500,Y,j*30);
  }
}

// ─── RIVER (Seine) ────────────────────────────────────────────────────────────
function drawRiver(alpha, t) {
  const Y=-82;
  for(let i=0;i<20;i++){
    const wave = Math.sin(i*0.4+t*1.5)*8;
    ctx.strokeStyle=`hsla(210,80%,55%,${alpha*(0.3+0.3*Math.sin(i+t))})`;
    ctx.lineWidth=1.5;
    line3d(-200+i*20,Y+wave,-60, -200+(i+1)*20,Y+Math.sin((i+1)*0.4+t*1.5)*8,-60);
  }
  // Reflection of tower in river
  ctx.globalAlpha=alpha*0.25;
  ctx.strokeStyle=`hsla(45,100%,60%,0.4)`;
  ctx.lineWidth=0.8;
  TOWER_SEGS.forEach(([x1,y1,z1,x2,y2,z2])=>{
    line3d(x1,-y1-160,z1, x2,-y2-160,z2);
  });
  ctx.globalAlpha=1;
}

// ─── FOG/MIST OVERLAY ────────────────────────────────────────────────────────
function drawFog(alpha, hue) {
  const grad = ctx.createRadialGradient(W/2,H,0,W/2,H,H*1.5);
  grad.addColorStop(0, `hsla(${hue},40%,10%,0)`);
  grad.addColorStop(0.5, `hsla(${hue},40%,8%,${alpha*0.3})`);
  grad.addColorStop(1, `hsla(${hue},40%,5%,${alpha})`);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
}

// ─── VIGNETTE ────────────────────────────────────────────────────────────────
function drawVignette(strength) {
  const g = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,`rgba(0,0,0,${strength})`);
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
}

// ─── STORY TEXT ──────────────────────────────────────────────────────────────
class StoryText {
  constructor() { this.alpha=0; this.text=''; this.sub=''; this.target=0; }
  set(text,sub='') { this.text=text; this.sub=sub; this.alpha=0; this.target=1; }
  hide() { this.target=0; }
  update() { this.alpha=lerp(this.alpha,this.target,0.025); }
  draw() {
    if(this.alpha<0.01) return;
    ctx.textAlign='center';
    const fs=Math.min(W*0.045,32);
    ctx.font=`300 ${fs}px Georgia,serif`;
    ctx.letterSpacing='4px';
    ctx.shadowColor='rgba(180,120,255,0.8)';
    ctx.shadowBlur=20;
    ctx.fillStyle=`rgba(230,210,255,${this.alpha*0.95})`;
    ctx.fillText(this.text, W/2, H*0.75);
    if(this.sub) {
      ctx.font=`200 ${fs*0.55}px Georgia,serif`;
      ctx.fillStyle=`rgba(180,160,220,${this.alpha*0.7})`;
      ctx.fillText(this.sub, W/2, H*0.75+fs*1.3);
    }
    ctx.shadowBlur=0;
    ctx.textAlign='left';
  }
}
const story = new StoryText();

// ─── SCROLLING TICKER ────────────────────────────────────────────────────────
const ticker = '  ✦  DREAM OF PARIS  ✦  NICOLAS/OPENCLAW PRODUCTIONS  ✦  DEDICATED TO THOSE WHO LEFT THEIR HEARTS IN PARIS  ✦  À BIENTÔT  ✦  ';
let tickX = 0;
function drawTicker(alpha) {
  if(alpha<0.01) return;
  const fh=Math.min(H*0.04,22);
  ctx.font=`bold ${fh}px monospace`;
  const tw=ctx.measureText(ticker).width;
  tickX=(tickX-1.5);
  if(tickX<-tw) tickX=W;
  ctx.fillStyle=`rgba(0,0,0,${alpha*0.75})`;
  ctx.fillRect(0,H-fh*1.6,W,fh*1.6);
  ctx.strokeStyle=`rgba(200,100,255,${alpha*0.5})`;
  ctx.lineWidth=0.5;
  ctx.strokeRect(0,H-fh*1.6,W,fh*1.6);
  ctx.fillStyle=`rgba(220,180,255,${alpha*0.9})`;
  ctx.fillText(ticker,tickX,H-fh*0.45);
  ctx.fillText(ticker,tickX+tw,H-fh*0.45);
}

// ─── SCENE SYSTEM ────────────────────────────────────────────────────────────
// Each scene: duration, camera path, what to draw, story text
const SCENES = [
  { // 0: OVERTURE
    dur:18, name:'overture',
    story:['Paris.','Été 1997.'],
    storySub:['','A dream she had forgotten to finish.'],
    cam:{ x:0,y:200,z:600, tx:0,ty:0,tz:0, fov:350 },
    camEnd:{ x:0,y:80,z:400, tx:0,ty:30,tz:0, fov:400 },
  },
  { // 1: ARRIVAL — descending through mist
    dur:20, name:'arrival',
    story:['She had not been back','in seven years.'],
    storySub:['','The city remembered.'],
    cam:{ x:120,y:180,z:380, tx:0,ty:20,tz:0, fov:380 },
    camEnd:{ x:60,y:60,z:280, tx:0,ty:30,tz:0, fov:420 },
  },
  { // 2: THE TOWER — close orbit
    dur:22, name:'tower',
    story:['La Dame de Fer.','Iron Lady. Still standing.'],
    storySub:['','As if she had never left.'],
    cam:{ x:120,y:20,z:200, tx:0,ty:40,tz:0, fov:500 },
    camEnd:{ x:-120,y:50,z:200, tx:0,ty:40,tz:0, fov:480 },
  },
  { // 3: THE SEINE — low over water
    dur:18, name:'seine',
    story:['The Seine carries everything','to the sea.'],
    storySub:['','Memories. Tears. Tuesday afternoons.'],
    cam:{ x:-80,y:-40,z:180, tx:0,ty:20,tz:-80, fov:460 },
    camEnd:{ x:80,y:-30,z:180, tx:0,ty:10,tz:-80, fov:460 },
  },
  { // 4: MINUIT — midnight, tower glittering
    dur:20, name:'minuit',
    story:['At midnight, Paris','holds its breath.'],
    storySub:['','The tower wears its sparks like jewels.'],
    cam:{ x:0,y:-20,z:260, tx:0,ty:60,tz:0, fov:500 },
    camEnd:{ x:30,y:10,z:240, tx:0,ty:70,tz:0, fov:480 },
  },
  { // 5: L'AUBE — dawn, pulling back
    dur:18, name:'aube',
    story:['But cities forgive.','They always do.'],
    storySub:['','Dawn breaks gold over the arrondissements.'],
    cam:{ x:0,y:80,z:250, tx:0,ty:40,tz:0, fov:420 },
    camEnd:{ x:40,y:100,z:400, tx:0,ty:30,tz:0, fov:380 },
  },
  { // 6: FIN — departure
    dur:16, name:'fin',
    story:['À bientôt,','Paris.'],
    storySub:['','Until the next dream.'],
    cam:{ x:80,y:150,z:500, tx:0,ty:30,tz:0, fov:360 },
    camEnd:{ x:0,y:200,z:700, tx:0,ty:0,tz:0, fov:320 },
  },
];

let sceneIdx=0, sceneT=0, totalT=0;
let prevStory=null;

function getCurrentScene() {
  let acc=0;
  for(let i=0;i<SCENES.length;i++){
    acc+=SCENES[i].dur;
    if(totalT<acc) return { scene:SCENES[i], idx:i, t:(totalT-(acc-SCENES[i].dur))/SCENES[i].dur };
  }
  // Loop
  totalT=0;
  return { scene:SCENES[0], idx:0, t:0 };
}

function setCam(sc, t) {
  const s=sc.scene, f=ease(t);
  cam.x=lerp(s.cam.x,s.camEnd.x,f);
  cam.y=lerp(s.cam.y,s.camEnd.y,f);
  cam.z=lerp(s.cam.z,s.camEnd.z,f);
  cam.tx=lerp(s.cam.tx,s.camEnd.tx,f);
  cam.ty=lerp(s.cam.ty,s.camEnd.ty,f);
  cam.tz=lerp(s.cam.tz,s.camEnd.tz,f);
  cam.fov=lerp(s.cam.fov,s.camEnd.fov,f);

  // Idle camera drift
  const drift=8;
  cam.x+=Math.sin(totalT*0.18)*drift;
  cam.y+=Math.cos(totalT*0.13)*drift*0.5;
}

// ─── SCENE PALETTE ───────────────────────────────────────────────────────────
function scenePalette(name, t) {
  const palettes = {
    overture: { sky:[240,80,3],  tower:270, grid:240, fog:0.7, glow:12 },
    arrival:  { sky:[220,70,4],  tower:200, grid:220, fog:0.5, glow:8  },
    tower:    { sky:[270,80,4],  tower:45,  grid:280, fog:0.4, glow:20 },
    seine:    { sky:[200,60,5],  tower:190, grid:200, fog:0.6, glow:6  },
    minuit:   { sky:[260,90,3],  tower:55,  grid:260, fog:0.5, glow:28 },
    aube:     { sky:[30,80,6],   tower:35,  grid:40,  fog:0.4, glow:15 },
    fin:      { sky:[260,60,4],  tower:280, grid:260, fog:0.8, glow:8  },
  };
  return palettes[name] || palettes.overture;
}

// ─── SKY ─────────────────────────────────────────────────────────────────────
function drawSky(pal, alpha) {
  const [h,s,l]=pal.sky;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, `hsla(${h},${s}%,${l}%,1)`);
  g.addColorStop(0.6, `hsla(${h+20},${s-20}%,${l*0.5}%,1)`);
  g.addColorStop(1, `hsla(${h+40},${s-30}%,2%,1)`);
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
}

// ─── AMBIENT PARTICLES ───────────────────────────────────────────────────────
function spawnAmbient(scene, t) {
  if(scene==='tower'||scene==='minuit') {
    if(Math.random()<0.4) embers.spawn(
      (Math.random()-0.5)*60,-80,(Math.random()-0.5)*60,
      {vy:-3-Math.random()*3, spread:4, decay:0.004, r:1.5+Math.random()*2,
       hue:45+Math.random()*30, sat:100, lit:80, alpha:0.9}
    );
  }
  if(scene==='aube') {
    if(Math.random()<0.2) embers.spawn(
      (Math.random()-0.5)*200, 20+Math.random()*40,(Math.random()-0.5)*200,
      {vy:-1, spread:6, decay:0.003, r:1+Math.random()*2,
       hue:30+Math.random()*40, sat:90, lit:75}
    );
  }
  if(Math.random()<0.05) mist.spawn(
    (Math.random()-0.5)*300,-80+Math.random()*40,(Math.random()-0.5)*300,
    {vy:-0.3, spread:2, decay:0.002, r:8+Math.random()*12,
     hue:220, sat:30, lit:70, alpha:0.08}
  );
  if(scene==='minuit'&&Math.random()<0.15) sparks.spawn(
    (Math.random()-0.5)*20, 30+Math.random()*80,(Math.random()-0.5)*20,
    {vy:-8-Math.random()*8, spread:15, decay:0.02, r:1,
     hue:55+Math.random()*20, sat:100, lit:90}
  );
}

// ─── MOON ────────────────────────────────────────────────────────────────────
function drawMoon(alpha) {
  const p = project(200,200,-400); if(!p) return;
  ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(20,p.scale*30),0,Math.PI*2);
  ctx.fillStyle=`rgba(240,230,200,${alpha*0.9})`;
  ctx.shadowColor='rgba(220,210,180,0.6)'; ctx.shadowBlur=30;
  ctx.fill(); ctx.shadowBlur=0;
}

// ─── TITLE CARD ──────────────────────────────────────────────────────────────
function drawTitleCard(alpha) {
  if(alpha<0.01) return;
  ctx.textAlign='center';
  const fs=Math.min(W*0.06,40);
  ctx.font=`100 ${fs*0.45}px Georgia,serif`;
  ctx.letterSpacing='8px';
  ctx.fillStyle=`rgba(200,180,255,${alpha*0.6})`;
  ctx.fillText('NICOLAS / OPENCLAW PRODUCTIONS PRESENTS', W/2, H*0.18);
  ctx.font=`400 ${fs}px Georgia,serif`;
  ctx.letterSpacing='12px';
  ctx.shadowColor=`rgba(180,100,255,${alpha*0.8})`; ctx.shadowBlur=40;
  ctx.fillStyle=`rgba(240,220,255,${alpha})`;
  ctx.fillText('DREAM OF PARIS', W/2, H*0.28);
  ctx.shadowBlur=0;
  ctx.font=`200 ${fs*0.4}px Georgia,serif`;
  ctx.letterSpacing='4px';
  ctx.fillStyle=`rgba(180,160,220,${alpha*0.7})`;
  ctx.fillText('A JOURNEY IN SEVEN MOVEMENTS', W/2, H*0.36);
  ctx.textAlign='left';
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastTime=0, storyShown=-1;
const TOTAL_DUR = SCENES.reduce((s,sc)=>s+sc.dur,0);

function frame(now) {
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime=now; totalT+=dt;
  if(totalT>=TOTAL_DUR) totalT=0;

  const sc = getCurrentScene();
  const { scene:S, idx, t:scT } = sc;
  const pal = scenePalette(S.name, scT);

  setCam(sc, scT);

  // Story text triggers
  if(idx!==storyShown) {
    storyShown=idx;
    const lines=S.story||[];
    story.set(lines[0]||'', S.storySub?S.storySub[1]:'');
  }
  if(scT>0.65) story.hide();
  story.update();

  // Spawn particles
  spawnAmbient(S.name, totalT);
  embers.update(); mist.update(); sparks.update();

  // ── DRAW ──────────────────────────────────────────────────────────────────
  drawSky(pal, 1);

  // Stars
  const starAlpha = S.name==='aube' ? 1-scT : 1;
  drawStars(starAlpha*0.9, totalT);

  // Moon
  const moonAlpha = S.name==='aube' ? Math.max(0,1-scT*2) : 0.8;
  drawMoon(moonAlpha);

  // Mist particles (behind tower)
  mist.draw(0.5);

  // River (seine scene)
  const riverA = S.name==='seine' ? smoothstep(0,0.3,scT)*smoothstep(1,0.8,scT) : 0;
  if(riverA>0) drawRiver(riverA, totalT);

  // Ground grid
  ctx.lineWidth=0.7;
  drawGround(pal.grid, 0.7, totalT);

  // Tower
  const towerHue = pal.tower + Math.sin(totalT*0.3)*15;
  drawTower(towerHue, 0.9, pal.glow);

  // Embers above tower
  embers.draw(0.9);
  sparks.draw(0.9);

  // Fog / atmosphere
  drawFog(pal.fog*0.6, pal.sky[0]);
  drawVignette(0.55);

  // Cinematic letterbox
  const lbH=Math.floor(H*0.07);
  ctx.fillStyle='rgba(0,0,0,0.92)';
  ctx.fillRect(0,0,W,lbH);
  ctx.fillRect(0,H-lbH-18,W,lbH+18);

  // Story text
  story.draw();

  // Title card (overture only)
  const titleA = S.name==='overture' ? smoothstep(0,0.2,scT)*smoothstep(1,0.7,scT) : 0;
  drawTitleCard(titleA);

  // Scene subtitle (top bar)
  if(scT<0.35) {
    const subA=smoothstep(0,0.1,scT)*smoothstep(0.35,0.25,scT);
    ctx.textAlign='left';
    ctx.font=`200 ${Math.min(H*0.022,14)}px Georgia,serif`;
    ctx.letterSpacing='5px';
    ctx.fillStyle=`rgba(180,160,220,${subA*0.7})`;
    ctx.fillText(`${idx+1} / ${SCENES.length}  ·  ${S.name.toUpperCase()}`, W*0.04, lbH*0.65);
  }

  // Ticker (after overture)
  const tickA = S.name==='overture' ? smoothstep(0.6,1,scT) : 1;
  drawTicker(tickA*0.85);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
