<canvas id="c"></canvas>
<script>
'use strict';
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H;
function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── MATH ────────────────────────────────────────────────────────────────────
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const ease = t => t;  // linear — camera moves at constant pace, always visible
const smoothstep = (a,b,t) => { const x=clamp((t-a)/(b-a),0,1); return x*x*(3-2*x); };

// ─── CAMERA ──────────────────────────────────────────────────────────────────
const cam = { x:0, y:60, z:350, tx:0, ty:40, tz:0, fov:420 };

function project(wx, wy, wz) {
  const dx=wx-cam.x, dy=wy-cam.y, dz=wz-cam.z;
  const lvx=cam.tx-cam.x, lvy=cam.ty-cam.y, lvz=cam.tz-cam.z;
  const ld=Math.sqrt(lvx*lvx+lvy*lvy+lvz*lvz)||1;
  const lx=lvx/ld, ly=lvy/ld, lz=lvz/ld;
  let rx=lz, ry=0, rz=-lx;
  const rm=Math.sqrt(rx*rx+rz*rz)||1; rx/=rm; rz/=rm;
  const ux=ly*rz-lz*ry, uy=lz*rx-lx*rz, uz=lx*ry-ly*rx;
  const cx2=dx*rx+dy*ry+dz*rz;
  const cy2=dx*ux+dy*uy+dz*uz;
  const cz2=dx*lx+dy*ly+dz*lz;
  if(cz2<=2) return null;
  const sc=cam.fov/cz2;
  return { x:W/2+cx2*sc, y:H/2-cy2*sc, z:cz2, scale:sc };
}

function line3d(x1,y1,z1,x2,y2,z2) {
  const a=project(x1,y1,z1), b=project(x2,y2,z2);
  if(!a||!b) return;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
}

// ─── STARS ───────────────────────────────────────────────────────────────────
const STARS = Array.from({length:180}, () => ({
  x:(Math.random()-0.5)*2800, y:50+Math.random()*500,
  z:(Math.random()-0.5)*2800, tw:Math.random()*Math.PI*2,
  r:Math.random()*2+0.8, hue:190+Math.random()*80
}));

function drawStars(alpha, t) {
  STARS.forEach(s => {
    const p=project(s.x,s.y,s.z); if(!p||p.z>1600) return;
    const tw=0.55+0.45*Math.sin(s.tw+t*2.2);
    const r=s.r*clamp(1-p.z/1600,0.3,1);
    // Soft halo without shadowBlur: large dim circle + bright core
    ctx.fillStyle=`hsla(${s.hue},50%,80%,${alpha*tw*0.25})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,r*2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`hsla(${s.hue},65%,95%,${alpha*tw*0.9})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
  });
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
class PS {
  constructor() { this.p=[]; }
  spawn(x,y,z,o={}) {
    if(this.p.length>50) return;  // cap — don't let the buffer grow unbounded
    this.p.push({
      x,y,z,
      vx:(Math.random()-0.5)*(o.spread||10),
      vy:o.vy!==undefined?o.vy:Math.random()*5+2,
      vz:(Math.random()-0.5)*(o.spread||10),
      life:1, decay:o.decay||0.007+Math.random()*0.005,
      r:o.r||2+Math.random()*3,
      hue:o.hue||50, sat:o.sat||100, lit:o.lit||75, alpha:o.alpha||1
    });
  }
  update() {
    this.p=this.p.filter(p=>{
      p.x+=p.vx*0.3; p.y+=p.vy*0.3; p.z+=p.vz*0.3;
      p.vy+=0.04; p.life-=p.decay; return p.life>0;
    });
  }
  draw(ga=1) {
    this.p.forEach(p=>{
      const pt=project(p.x,p.y,p.z); if(!pt) return;
      const a=p.life*p.alpha*ga;
      const r=Math.max(1,p.r);
      // Glow without shadowBlur: outer dim halo + bright core
      ctx.fillStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,${a*0.2})`;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,r*3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,${a})`;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2); ctx.fill();
    });
  }
}
const embers=new PS(), mist=new PS(), sparks=new PS();

// ─── EIFFEL TOWER ────────────────────────────────────────────────────────────
function buildTower() {
  const segs=[], add=(x1,y1,z1,x2,y2,z2)=>segs.push([x1,y1,z1,x2,y2,z2]);
  const N=14;
  const dirs=[{dx:1,dz:1},{dx:1,dz:-1},{dx:-1,dz:1},{dx:-1,dz:-1}];

  // Curved legs
  dirs.forEach(({dx,dz})=>{
    for(let i=0;i<N;i++){
      const f1=i/N, f2=(i+1)/N;
      const c1=Math.pow(1-f1,1.5), c2=Math.pow(1-f2,1.5);
      add(dx*60*c1,-80+65*f1,dz*60*c1, dx*60*c2,-80+65*f2,dz*60*c2);
    }
    // Cross-braces
    for(let i=0;i<8;i++){
      const f=i/8+0.06, cc=Math.pow(1-f,1.5);
      add(dx*60*cc,-80+65*f,dz*60*cc, dx*20*cc,-80+65*f,dz*20*cc);
    }
  });

  // Base arches
  const ap=22;
  [{ax:1,az:0},{ax:-1,az:0},{ax:0,az:1},{ax:0,az:-1}].forEach(({ax,az})=>{
    for(let i=0;i<ap;i++){
      const a1=(i/ap)*Math.PI-Math.PI/2, a2=((i+1)/ap)*Math.PI-Math.PI/2;
      const r=60;
      add(ax*r*Math.cos(a1),-80,az*r*Math.cos(a1)+r*Math.sin(a1),
          ax*r*Math.cos(a2),-80,az*r*Math.cos(a2)+r*Math.sin(a2));
    }
  });

  // First platform ring
  const p1y=-15, r1=23, rs=22;
  for(let i=0;i<rs;i++){
    const a1=(i/rs)*Math.PI*2, a2=((i+1)/rs)*Math.PI*2;
    add(Math.cos(a1)*r1,p1y,Math.sin(a1)*r1, Math.cos(a2)*r1,p1y,Math.sin(a2)*r1);
    add(Math.cos(a1)*r1,p1y,Math.sin(a1)*r1, Math.cos(a1)*(r1-6),p1y+6,Math.sin(a1)*(r1-6));
  }

  // Mid section struts + lattice rings
  const ms=12;
  for(let i=0;i<ms;i++){
    const a=(i/ms)*Math.PI*2, r0=20, r1t=9;
    add(Math.cos(a)*r0,p1y,Math.sin(a)*r0, Math.cos(a)*r1t,p1y+66,Math.sin(a)*r1t);
    for(let j=0;j<7;j++){
      const f=j/7, rb=lerp(r0,r1t,f), rc=lerp(r0,r1t,(j+1)/7);
      add(Math.cos(a)*rb,p1y+66*f,Math.sin(a)*rb, Math.cos(a)*rc,p1y+66*(j+1)/7,Math.sin(a)*rc);
    }
  }
  for(let j=0;j<9;j++){
    const f=(j+1)/10, rr=lerp(20,9,f), yy=p1y+66*f;
    for(let i=0;i<18;i++){
      const a1=(i/18)*Math.PI*2, a2=((i+1)/18)*Math.PI*2;
      add(Math.cos(a1)*rr,yy,Math.sin(a1)*rr, Math.cos(a2)*rr,yy,Math.sin(a2)*rr);
    }
  }

  // Second platform
  const p2y=p1y+66, r2=10;
  for(let i=0;i<rs;i++){
    const a1=(i/rs)*Math.PI*2, a2=((i+1)/rs)*Math.PI*2;
    add(Math.cos(a1)*r2,p2y,Math.sin(a1)*r2, Math.cos(a2)*r2,p2y,Math.sin(a2)*r2);
  }

  // Spire
  const sp=16;
  for(let i=0;i<sp;i++){
    const a=(i/sp)*Math.PI*2;
    add(Math.cos(a)*9,p2y,Math.sin(a)*9, 0,p2y+56,0);
    for(let j=0;j<5;j++){
      const f=j/5, rr=9*(1-f), rr2=9*(1-(j+1)/5);
      add(Math.cos(a)*rr,p2y+56*f,Math.sin(a)*rr, Math.cos(a)*rr2,p2y+56*(j+1)/5,Math.sin(a)*rr2);
    }
  }

  // Antenna
  add(0,p2y+56,0, 0,p2y+74,0);
  return segs;
}
const TOWER_SEGS=buildTower();

function drawTower(hue, alpha, glow) {
  // Pass 1 — wide soft glow (thick transparent lines, no shadowBlur)
  ctx.lineWidth=7; ctx.strokeStyle=`hsla(${hue},100%,62%,${alpha*0.10})`;
  TOWER_SEGS.forEach(([x1,y1,z1,x2,y2,z2])=>line3d(x1,y1,z1,x2,y2,z2));
  // Pass 2 — crisp bright core
  ctx.lineWidth=1.8; ctx.strokeStyle=`hsla(${hue},85%,92%,${alpha})`;
  TOWER_SEGS.forEach(([x1,y1,z1,x2,y2,z2])=>line3d(x1,y1,z1,x2,y2,z2));
}

// ─── CITY SILHOUETTE ─────────────────────────────────────────────────────────
const BLDGS=[
  // Left bank
  {x:-360,z:60, w:85,h:52}, {x:-260,z:40, w:65,h:72}, {x:-180,z:25, w:50,h:40},
  // Right bank
  {x:140, z:30, w:55,h:68}, {x:205, z:45, w:72,h:50}, {x:285, z:65, w:62,h:74},
  // Far background
  {x:-220,z:-180,w:80,h:58}, {x:-130,z:-160,w:60,h:82},
  {x:130, z:-170,w:72,h:54}, {x:215, z:-190,w:88,h:64},
  {x:-420,z:-280,w:130,h:44},{x:340, z:-280,w:120,h:48},
];

function drawBuildings(hue, alpha) {
  const GY=-80;
  BLDGS.forEach(b=>{
    const bl=project(b.x,      GY,      b.z);
    const br=project(b.x+b.w,  GY,      b.z);
    const brt=project(b.x+b.w, GY+b.h,  b.z);
    const blt=project(b.x,     GY+b.h,  b.z);
    if(!bl||!br||!brt||!blt) return;
    ctx.fillStyle=`hsla(${hue},15%,7%,${alpha*0.96})`;
    ctx.strokeStyle=`hsla(${hue},35%,20%,${alpha*0.35})`;
    ctx.lineWidth=0.6;
    ctx.beginPath();
    ctx.moveTo(bl.x,bl.y); ctx.lineTo(br.x,br.y);
    ctx.lineTo(brt.x,brt.y); ctx.lineTo(blt.x,blt.y);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // A couple lit windows
    for(let wy=0;wy<3;wy++) for(let wx=0;wx<2;wx++){
      const wp=project(b.x+b.w*(0.2+wx*0.55), GY+b.h*(0.25+wy*0.28), b.z-1);
      if(wp && Math.sin(b.x*7+wy*13+wx*31)>0.1){
        ctx.fillStyle=`hsla(45,85%,70%,${alpha*0.5})`;
        ctx.beginPath(); ctx.arc(wp.x,wp.y,Math.max(1,1.8*wp.scale*0.004+1),0,Math.PI*2); ctx.fill();
      }
    }
  });
}

// ─── GROUND GRID ─────────────────────────────────────────────────────────────
function drawGround(hue, alpha) {
  const Y=-80; ctx.lineWidth=0.55;
  for(let i=-22;i<=22;i++){
    const a=alpha*(Math.abs(i)===0?0.5:0.22);
    ctx.strokeStyle=`hsla(${hue},55%,28%,${a})`;
    line3d(i*25,Y,-700, i*25,Y,700);
    line3d(-700,Y,i*25, 700,Y,i*25);
  }
}

// ─── RIVER ───────────────────────────────────────────────────────────────────
function drawRiver(alpha, t) {
  if(alpha<0.01) return;
  const Y=-83, Z=-70;
  for(let i=0;i<26;i++){
    const w1=Math.sin(i*0.38+t*1.9)*11, w2=Math.sin((i+1)*0.38+t*1.9)*11;
    ctx.strokeStyle=`hsla(210,88%,62%,${alpha*(0.35+0.22*Math.sin(i*0.5+t))})`;
    ctx.lineWidth=2.2;
    line3d(-265+i*22,Y+w1,Z, -265+(i+1)*22,Y+w2,Z);
  }
  // Shimmer sparks on water
  if(Math.random()<0.12){
    const wx=-265+Math.random()*572, wz=Z+Math.random()*25-12;
    const wp=project(wx,Y+2,wz);
    if(wp){ ctx.fillStyle=`hsla(200,95%,92%,${alpha*0.6*Math.random()})`; ctx.beginPath(); ctx.arc(wp.x,wp.y,1.8,0,Math.PI*2); ctx.fill(); }
  }
  // Tower reflection
  ctx.globalAlpha=alpha*0.2;
  ctx.strokeStyle=`hsla(50,100%,60%,0.6)`;
  ctx.lineWidth=0.9;
  TOWER_SEGS.forEach(([x1,y1,z1,x2,y2,z2])=>line3d(x1,-y1-162,z1+Z-10, x2,-y2-162,z2+Z-10));
  ctx.globalAlpha=1;
}

// ─── SKY ─────────────────────────────────────────────────────────────────────
function drawSky(pal) {
  const [h,s,l]=pal.sky;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,   `hsl(${h},${s}%,${l}%)`);
  g.addColorStop(0.5, `hsl(${h+12},${Math.max(s-18,20)}%,${Math.max(l*0.38,2.5)}%)`);
  g.addColorStop(1,   `hsl(${h+22},${Math.max(s-28,15)}%,${Math.max(l*0.18,1.2)}%)`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Horizon glow (city light / ambient)
  const hy=H*0.53;
  const hg=ctx.createRadialGradient(W/2,hy,0, W/2,hy,W*0.58);
  hg.addColorStop(0,   `hsla(${h+18},85%,52%,0.14)`);
  hg.addColorStop(0.45,`hsla(${h+10},75%,42%,0.06)`);
  hg.addColorStop(1,   `hsla(${h},65%,32%,0)`);
  ctx.fillStyle=hg; ctx.fillRect(0,0,W,H);
}

// ─── MOON ────────────────────────────────────────────────────────────────────
function drawMoon(alpha) {
  const p=project(185,185,-520); if(!p) return;
  const r=Math.max(22,p.scale*22);
  // Layered halos — no shadowBlur
  ctx.fillStyle=`rgba(235,218,182,${alpha*0.04})`; ctx.beginPath(); ctx.arc(p.x,p.y,r*3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(240,228,195,${alpha*0.08})`; ctx.beginPath(); ctx.arc(p.x,p.y,r*2.2,0,Math.PI*2); ctx.fill();
  // Disc
  ctx.fillStyle=`rgba(250,240,215,${alpha*0.93})`; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
}

// ─── FOG ─────────────────────────────────────────────────────────────────────
function drawFog(alpha, hue) {
  const g=ctx.createRadialGradient(W/2,H,0, W/2,H,H*1.5);
  g.addColorStop(0,   `hsla(${hue},38%,10%,0)`);
  g.addColorStop(0.38,`hsla(${hue},38%,8%,${alpha*0.18})`);
  g.addColorStop(1,   `hsla(${hue},38%,5%,${alpha*0.55})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawVignette(str) {
  const g=ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.9);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,`rgba(0,0,0,${str})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// ─── STORY TEXT ──────────────────────────────────────────────────────────────
class StoryText {
  constructor(){ this.a=0; this.l1=''; this.l2=''; this.sub=''; this.tgt=0; }
  set(l1='',l2='',sub=''){ this.l1=l1; this.l2=l2; this.sub=sub; this.a=0; this.tgt=1; }
  hide(){ this.tgt=0; }
  update(){ this.a=lerp(this.a,this.tgt,0.03); }
  draw(){
    if(this.a<0.01) return;
    ctx.textAlign='center';
    const fs=Math.min(W*0.047,33);
    let y=H*0.70;

    if(this.l1){
      ctx.font=`300 ${fs}px Georgia,serif`; ctx.letterSpacing='4px';
      ctx.fillStyle=`rgba(248,230,255,${this.a*0.97})`;
      ctx.fillText(this.l1,W/2,y); y+=fs*1.48;
    }
    if(this.l2){
      ctx.font=`300 ${fs*0.78}px Georgia,serif`; ctx.letterSpacing='3px';
      ctx.fillStyle=`rgba(218,198,248,${this.a*0.84})`;
      ctx.fillText(this.l2,W/2,y); y+=fs*1.2;
    }
    if(this.sub){
      ctx.font=`200 ${fs*0.46}px Georgia,serif`; ctx.letterSpacing='2px';
      ctx.fillStyle=`rgba(172,148,215,${this.a*0.58})`;
      ctx.fillText(this.sub,W/2,y);
    }
    ctx.textAlign='left';
  }
}
const story=new StoryText();

// ─── TICKER ──────────────────────────────────────────────────────────────────
const TICK='  ✦  DREAM OF PARIS  ✦  NICOLAS/OPENCLAW PRODUCTIONS  ✦  DEDICATED TO THOSE WHO LEFT THEIR HEARTS IN PARIS  ✦  À BIENTÔT  ✦  ';
let tickX=0;
function drawTicker(alpha){
  if(alpha<0.01) return;
  const fh=Math.min(H*0.038,21);
  ctx.font=`bold ${fh}px monospace`;
  const tw=ctx.measureText(TICK).width;
  tickX-=1.3; if(tickX<-tw) tickX=W;
  const bh=fh*1.75;
  ctx.fillStyle=`rgba(0,0,0,${alpha*0.84})`; ctx.fillRect(0,H-bh,W,bh);
  ctx.strokeStyle=`rgba(195,95,255,${alpha*0.4})`; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(0,H-bh); ctx.lineTo(W,H-bh); ctx.stroke();
  ctx.fillStyle=`rgba(218,178,255,${alpha*0.9})`;
  ctx.fillText(TICK,tickX,H-fh*0.4);
  ctx.fillText(TICK,tickX+tw,H-fh*0.4);
}

// ─── TITLE CARD ──────────────────────────────────────────────────────────────
function drawTitle(alpha){
  if(alpha<0.01) return;
  ctx.textAlign='center';
  const fs=Math.min(W*0.062,44);
  ctx.font=`100 ${fs*0.37}px Georgia,serif`; ctx.letterSpacing='7px';
  ctx.fillStyle=`rgba(188,165,228,${alpha*0.55})`;
  ctx.fillText('NICOLAS / OPENCLAW PRODUCTIONS PRESENTS',W/2,H*0.18);
  ctx.font=`400 ${fs}px Georgia,serif`; ctx.letterSpacing='14px';
  ctx.fillStyle=`rgba(248,228,255,${alpha})`;
  ctx.fillText('DREAM OF PARIS',W/2,H*0.28);
  ctx.font=`200 ${fs*0.37}px Georgia,serif`; ctx.letterSpacing='5px';
  ctx.fillStyle=`rgba(172,152,218,${alpha*0.62})`;
  ctx.fillText('A JOURNEY IN SEVEN MOVEMENTS',W/2,H*0.36);
  ctx.textAlign='left';
}

  { dur:10, name:'aube',
    l1:'But cities forgive.',   l2:'They always do.',  sub:'Dawn breaks gold over the arrondissements.',
    cam:    {x:-80, y:60, z:220,tx:0,ty:50, tz:0,  fov:480},
    camEnd: {x:120, y:160,z:520,tx:0,ty:20, tz:0,  fov:340},
    sky:[28,78,15],  tower:38,  grid:38,  fog:0.32, glow:20 },

  { dur:10, name:'fin',
    l1:'À bientôt,',            l2:'Paris.',            sub:'Until the next dream.',
    cam:    {x:100, y:180,z:460,tx:0,ty:40, tz:0,  fov:380},
    camEnd: {x:0,   y:300,z:820,tx:0,ty:0,  tz:0,  fov:300},
    sky:[265,52,11], tower:280, grid:265, fog:0.52, glow:10 },
];

const TOTAL_DUR=SCENES.reduce((s,sc)=>s+sc.dur,0);
let totalT=0, storyShown=-1;

function getScene(){
  let acc=0;
  for(let i=0;i<SCENES.length;i++){
    if(totalT<acc+SCENES[i].dur) return {S:SCENES[i],idx:i,t:(totalT-acc)/SCENES[i].dur};
    acc+=SCENES[i].dur;
  }
  return {S:SCENES[0],idx:0,t:0};
}

function setCam(S, t){
  const f=ease(t);
  cam.x  =lerp(S.cam.x,  S.camEnd.x,  f)+Math.sin(totalT*0.55)*22;
  cam.y  =lerp(S.cam.y,  S.camEnd.y,  f)+Math.cos(totalT*0.42)*12;
  cam.z  =lerp(S.cam.z,  S.camEnd.z,  f);
  cam.tx =lerp(S.cam.tx, S.camEnd.tx, f);
  cam.ty =lerp(S.cam.ty, S.camEnd.ty, f);
  cam.tz =lerp(S.cam.tz, S.camEnd.tz, f);
  cam.fov=lerp(S.cam.fov,S.camEnd.fov,f);
}

// ─── AMBIENT PARTICLE SPAWNER ────────────────────────────────────────────────
function spawnAmbient(name){
  if(name==='tower'||name==='minuit'){
    if(Math.random()<0.3) embers.spawn(
      (Math.random()-0.5)*65,-80,(Math.random()-0.5)*65,
      {vy:-4.5-Math.random()*4.5,spread:6,decay:0.007,r:2.2+Math.random()*2.5,
       hue:45+Math.random()*20,sat:100,lit:88,alpha:0.95});
  }
  if(name==='aube'){
    if(Math.random()<0.15) embers.spawn(
      (Math.random()-0.5)*260,28+Math.random()*55,(Math.random()-0.5)*260,
      {vy:-1.8,spread:9,decay:0.005,r:1.8+Math.random()*2.8,
       hue:32+Math.random()*32,sat:92,lit:80});
  }
  if(Math.random()<0.04) mist.spawn(
    (Math.random()-0.5)*450,-76+Math.random()*32,(Math.random()-0.5)*450,
    {vy:-0.18,spread:2.5,decay:0.003,r:14+Math.random()*20,
     hue:220,sat:22,lit:78,alpha:0.065});
  if(name==='minuit'&&Math.random()<0.12) sparks.spawn(
    (Math.random()-0.5)*28,18+Math.random()*105,(Math.random()-0.5)*28,
    {vy:-11-Math.random()*11,spread:20,decay:0.022,r:1.3,
     hue:55+Math.random()*28,sat:100,lit:98});
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastTime=0;
function frame(now){
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now; totalT+=dt;
  if(totalT>=TOTAL_DUR) totalT-=TOTAL_DUR;

  const {S,idx,t:scT}=getScene();
  setCam(S,scT);

  // Story triggers
  if(idx!==storyShown){ storyShown=idx; story.set(S.l1,S.l2,S.sub); }
  if(scT>0.63) story.hide();
  story.update();

  spawnAmbient(S.name);
  embers.update(); mist.update(); sparks.update();

  // ── DRAW ──────────────────────────────────────────────────────────────────
  drawSky(S);
  const starA=S.name==='aube'?Math.max(0,1-scT*2.8):0.92;
  drawStars(starA,totalT);
  const moonA=S.name==='aube'?Math.max(0,1-scT*2.8):0.88;
  drawMoon(moonA);
  mist.draw(0.65);
  drawBuildings(S.tower,0.95);

  // River: full in seine, partial elsewhere
  const riverFull=S.name==='seine'?smoothstep(0,0.25,scT)*smoothstep(1,0.82,scT):0;
  const riverBase=(['overture','arrival'].includes(S.name))?0:0.2;
  drawRiver(Math.max(riverFull,riverBase),totalT);

  drawGround(S.grid,0.6);

  const tHue=S.tower+Math.sin(totalT*0.42)*14;
  const pulse=S.name==='minuit'?1+0.18*Math.sin(totalT*5.8):1;
  drawTower(tHue,0.92,S.glow*pulse);

  embers.draw(1); sparks.draw(1);

  drawFog(S.fog,S.sky[0]);
  drawVignette(0.48);

  // Letterbox bars
  const lbH=Math.floor(H*0.077);
  ctx.fillStyle='rgba(0,0,0,0.95)';
  ctx.fillRect(0,0,W,lbH);
  ctx.fillRect(0,H-lbH-22,W,lbH+22);

  story.draw();

  // Title card (overture only)
  drawTitle(S.name==='overture'?smoothstep(0,0.18,scT)*smoothstep(1,0.72,scT):0);

  // Scene label
  if(scT<0.28){
    const sa=smoothstep(0,0.07,scT)*smoothstep(0.28,0.2,scT);
    ctx.textAlign='left';
    ctx.font=`200 ${Math.min(H*0.021,13)}px Georgia,serif`;
    ctx.letterSpacing='5px';
    ctx.fillStyle=`rgba(172,152,215,${sa*0.74})`;
    ctx.fillText(`${String(idx+1).padStart(2,'0')} / ${SCENES.length}  ·  ${S.name.toUpperCase()}`,W*0.04,lbH*0.65);
  }

  // Ticker
  drawTicker(S.name==='overture'?smoothstep(0.55,1,scT):0.88);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
