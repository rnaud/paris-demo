<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DREAM OF PARIS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ─── 3D PROJECTION ───────────────────────────────────────────────────────────
let camX = 0, camY = 0, camZ = 300;
let rotY = 0, rotX = 0.18;
const FL = 400; // focal length

function project(x, y, z) {
  // Rotate Y
  const x1 = x * Math.cos(rotY) - z * Math.sin(rotY);
  const z1 = x * Math.sin(rotY) + z * Math.cos(rotY);
  // Rotate X
  const y2 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
  const z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
  const zd = z2 + camZ;
  if (zd <= 0) return null;
  const scale = FL / zd;
  return { x: cx + x1 * scale, y: cy - y2 * scale, z: zd, scale };
}

function line3d(x1,y1,z1,x2,y2,z2,col,lw=1) {
  const a = project(x1,y1,z1);
  const b = project(x2,y2,z2);
  if (!a || !b) return;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = col;
  ctx.lineWidth = lw;
  ctx.stroke();
}

// ─── EIFFEL TOWER GEOMETRY ────────────────────────────────────────────────────
function drawTower(hue, t) {
  const col = `hsl(${hue},100%,60%)`;
  const col2 = `hsl(${(hue+60)%360},100%,70%)`;

  // ── Legs (4 tapered pillars) ──
  const legBase = 55, legTop = 20, legH = 55;
  const dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
  dirs.forEach(([dx,dz]) => {
    // outer edge of leg
    line3d(dx*legBase, -80, dz*legBase, dx*legTop, -80+legH, dz*legTop, col, 2);
    // inner edge
    line3d(dx*legBase*0.4, -80, dz*legBase*0.4, dx*legTop*0.6, -80+legH, dz*legTop*0.6, col, 1.5);
    // cross braces
    for (let i=0;i<4;i++) {
      const frac = i/4, frac2 = (i+1)/4;
      const bx1 = dx*(legBase*(1-frac) + legTop*frac);
      const bz1 = dz*(legBase*(1-frac) + legTop*frac);
      const bx2 = dx*(legBase*(1-frac2) + legTop*frac2);
      const bz2 = dz*(legBase*(1-frac2) + legTop*frac2);
      const by1 = -80 + legH*frac, by2 = -80 + legH*frac2;
      // horizontal brace
      line3d(bx1, by1, bz1, bx2, by2, bz2, col, 1);
    }
  });

  // ── Arch connections between legs ──
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dz],i) => {
    const s = dx||dz;
    line3d(dx*legBase+dz*legBase, -80, dz*legBase+dx*legBase, dx*legBase-dz*legBase, -80, dz*legBase-dx*legBase, col, 1.5);
    // arched apex
    line3d((dx+dz)*legBase, -80, (dz+dx)*legBase, 0, -80+legH*0.6, 0, col, 1);
    line3d((dx-dz)*legBase, -80, (dz-dx)*legBase, 0, -80+legH*0.6, 0, col, 1);
  });

  // ── First platform ring ──
  const p1y = -80+legH+2;
  const r1 = 22;
  const segs = 16;
  for(let i=0;i<segs;i++) {
    const a1=(i/segs)*Math.PI*2, a2=((i+1)/segs)*Math.PI*2;
    line3d(Math.cos(a1)*r1,p1y,Math.sin(a1)*r1, Math.cos(a2)*r1,p1y,Math.sin(a2)*r1, col2, 1.5);
  }

  // ── Middle section ──
  const m1y = p1y, m2y = p1y+60;
  const mw1 = 20, mw2 = 8;
  [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([dx,dz]) => {
    line3d(dx*mw1, m1y, dz*mw1, dx*mw2, m2y, dz*mw2, col, 2);
    // cross braces
    for(let i=0;i<5;i++){
      const f=i/5,f2=(i+1)/5;
      const x1=dx*(mw1+(mw2-mw1)*f), z1=dz*(mw1+(mw2-mw1)*f), y1=m1y+(m2y-m1y)*f;
      const x2=dx*(mw1+(mw2-mw1)*f2), z2=dz*(mw1+(mw2-mw1)*f2), y2=m1y+(m2y-m1y)*f2;
      line3d(x1,y1,z1,x2,y2,z2,col,0.8);
    }
  });

  // ── Second platform ──
  const p2y = m2y;
  const r2 = 10;
  for(let i=0;i<segs;i++){
    const a1=(i/segs)*Math.PI*2, a2=((i+1)/segs)*Math.PI*2;
    line3d(Math.cos(a1)*r2,p2y,Math.sin(a1)*r2, Math.cos(a2)*r2,p2y,Math.sin(a2)*r2, col2, 1.5);
  }

  // ── Spire ──
  const spireBot = p2y, spireTop = p2y+55;
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dz]) => {
    line3d(dx*mw2, spireBot, dz*mw2, 0, spireTop, 0, col, 1.5);
  });
  for(let i=0;i<6;i++){
    const f=i/6;
    const w=mw2*(1-f);
    const y=spireBot+(spireTop-spireBot)*f;
    line3d(-w,y,0,w,y,0,col,0.8);
    line3d(0,y,-w,0,y,w,col,0.8);
  }

  // ── Antenna ──
  const antTop = spireTop+18;
  line3d(0,spireTop,0,0,antTop,0,'#ff2222',2);
  // blinking light
  if (Math.sin(t*4)>0) {
    const pt = project(0,antTop,0);
    if(pt){
      ctx.beginPath();
      ctx.arc(pt.x,pt.y,4,0,Math.PI*2);
      ctx.fillStyle='#ff0000';
      ctx.fill();
      ctx.shadowColor='#ff0000';
      ctx.shadowBlur=12;
      ctx.fill();
      ctx.shadowBlur=0;
    }
  }
}

// ─── STARS ───────────────────────────────────────────────────────────────────
const stars = Array.from({length:200},()=>({
  x:(Math.random()-0.5)*800,
  y:(Math.random()-0.5)*400,
  z:(Math.random()-0.5)*800,
  r:Math.random()*1.5+0.3
}));

function drawStars() {
  stars.forEach(s=>{
    const p=project(s.x,s.y,s.z);
    if(!p) return;
    const brightness = Math.floor(180+Math.random()*75);
    ctx.beginPath();
    ctx.arc(p.x,p.y,s.r*p.scale*0.3,0,Math.PI*2);
    ctx.fillStyle=`rgb(${brightness},${brightness},${brightness})`;
    ctx.fill();
  });
}

// ─── GROUND GRID ──────────────────────────────────────────────────────────────
function drawGrid(hue,t) {
  const cols=16,rows=10,size=30,gw=cols*size,gh=rows*size;
  const col=`hsl(${hue},100%,40%)`;
  ctx.lineWidth=0.8;
  for(let i=0;i<=cols;i++){
    const x=-gw/2+i*size;
    line3d(x,-80,-gh/2, x,-80,gh/2, col);
  }
  for(let j=0;j<=rows;j++){
    const z=-gh/2+j*size;
    line3d(-gw/2,-80,z, gw/2,-80,z, col);
  }
}

// ─── FLOATING TORUS ──────────────────────────────────────────────────────────
function drawTorus(ox,oy,oz, R,r,segs,hue) {
  const col=`hsl(${hue},100%,60%)`;
  for(let i=0;i<segs;i++){
    const a1=(i/segs)*Math.PI*2, a2=((i+1)/segs)*Math.PI*2;
    for(let j=0;j<segs/2;j++){
      const b1=(j/(segs/2))*Math.PI*2, b2=((j+1)/(segs/2))*Math.PI*2;
      const x1=(R+r*Math.cos(b1))*Math.cos(a1);
      const y1=r*Math.sin(b1);
      const z1=(R+r*Math.cos(b1))*Math.sin(a1);
      const x2=(R+r*Math.cos(b2))*Math.cos(a1);
      const y2=r*Math.sin(b2);
      const z2=(R+r*Math.cos(b2))*Math.sin(a1);
      line3d(ox+x1,oy+y1,oz+z1, ox+x2,oy+y2,oz+z2, col, 0.8);
    }
  }
}

// ─── PLASMA BACKGROUND ───────────────────────────────────────────────────────
let plasmaCanvas, plasmaCtx, plasmaData;
function initPlasma() {
  plasmaCanvas = document.createElement('canvas');
  plasmaCanvas.width = 80; plasmaCanvas.height = 60;
  plasmaCtx = plasmaCanvas.getContext('2d');
  plasmaData = plasmaCtx.createImageData(80,60);
}
initPlasma();

function drawPlasma(t) {
  const d = plasmaData.data;
  for(let y=0;y<60;y++) for(let x=0;x<80;x++){
    const v = Math.sin(x*0.3+t*1.5)
            + Math.sin(y*0.3+t*1.2)
            + Math.sin((x+y)*0.2+t)
            + Math.sin(Math.sqrt(x*x+y*y)*0.4+t*0.8);
    const i=(y*80+x)*4;
    d[i]   = Math.floor((Math.sin(v*1.2)*0.5+0.5)*60);
    d[i+1] = Math.floor((Math.sin(v*0.9+2)*0.5+0.5)*30);
    d[i+2] = Math.floor((Math.sin(v*1.1+4)*0.5+0.5)*80);
    d[i+3] = 180;
  }
  plasmaCtx.putImageData(plasmaData,0,0);
  ctx.drawImage(plasmaCanvas,0,0,W,H);
}

// ─── SCROLLER ────────────────────────────────────────────────────────────────
const msg = '  ★  DREAM OF PARIS  ★  CODED BY NICOLAS/OPENCLAW  ★  GREETINGS TO ALL LOVERS OF LA TOUR EIFFEL  ★  VIVE LA FRANCE  ★  AMOUR TOUJOURS  ★  THIS DEMO IS DEDICATED TO THE CITY OF LIGHT  ★  AUX CHAMPS-ÉLYSÉES  ★  ';
let scrollX = W;

function drawScroller(t) {
  const fh = Math.min(H*0.05, 28);
  const sy = H - fh - 4;
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.fillRect(0,sy-4,W,fh+8);
  ctx.strokeStyle=`hsl(${(t*60)%360},100%,60%)`;
  ctx.lineWidth=1.5;
  ctx.strokeRect(0,sy-4,W,fh+8);
  ctx.font=`bold ${fh}px monospace`;
  const hue=(t*50)%360;
  const grad=ctx.createLinearGradient(0,sy,W,sy);
  grad.addColorStop(0,`hsl(${hue},100%,60%)`);
  grad.addColorStop(0.5,`hsl(${(hue+60)%360},100%,70%)`);
  grad.addColorStop(1,`hsl(${(hue+120)%360},100%,60%)`);
  ctx.fillStyle=grad;
  const tw=ctx.measureText(msg).width;
  scrollX-=2.5;
  if(scrollX<-tw) scrollX=W;
  ctx.fillText(msg,scrollX,sy+fh*0.8);
}

// ─── TITLE ───────────────────────────────────────────────────────────────────
function drawTitle(t) {
  const fs = Math.min(W*0.07, 42);
  ctx.font=`bold ${fs}px monospace`;
  ctx.textAlign='center';
  const hue=(t*40)%360;
  ctx.shadowColor=`hsl(${hue},100%,60%)`;
  ctx.shadowBlur=24;
  ctx.fillStyle=`hsl(${hue},100%,65%)`;
  ctx.fillText('✦ DREAM OF PARIS ✦',cx,fs*1.2);
  ctx.font=`${fs*0.35}px monospace`;
  ctx.fillStyle=`hsl(${(hue+120)%360},100%,60%)`;
  ctx.fillText('A DEMOSCENE TRIBUTE · MCMXCVII · OPENCLAW PRODUCTIONS',cx,fs*1.2+fs*0.5);
  ctx.shadowBlur=0;
  ctx.textAlign='left';
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let t=0;
function frame() {
  t+=0.016;

  // Slow camera orbit
  rotY = t*0.12;

  // Background
  ctx.fillStyle='rgba(0,0,10,1)';
  ctx.fillRect(0,0,W,H);

  // Plasma sky (top half)
  drawPlasma(t);

  // Dark overlay to keep it readable
  ctx.fillStyle='rgba(0,0,10,0.55)';
  ctx.fillRect(0,0,W,H);

  drawStars();

  const gridHue=(t*20)%360;
  drawGrid(gridHue,t);

  // Orbiting tori
  for(let i=0;i<3;i++){
    const ang=t*0.4+i*(Math.PI*2/3);
    const tx=Math.cos(ang)*90, tz=Math.sin(ang)*90;
    const ty=-20+Math.sin(t*0.7+i*1.2)*20;
    drawTorus(tx,ty,tz, 14,4, 12, (gridHue+i*120)%360);
  }

  const towerHue=(t*30)%360;
  drawTower(towerHue,t);

  drawTitle(t);
  drawScroller(t);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
